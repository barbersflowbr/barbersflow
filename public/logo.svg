<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%" fx="30%" fy="30%">
      <stop offset="0%" stop-color="#1E1E24" />
      <stop offset="100%" stop-color="#0E0E11" />
    </radialGradient>
    
    <!-- Gold Gradient for Logo Accent -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCD34D" /> <!-- Amber 300 -->
      <stop offset="50%" stop-color="#F59E0B" /> <!-- Amber 500 -->
      <stop offset="100%" stop-color="#B45309" /> <!-- Amber 700 -->
    </linearGradient>

    <!-- Subtle Silver/Gray for secondary accents -->
    <linearGradient id="silverGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E5E7EB" />
      <stop offset="100%" stop-color="#9CA3AF" />
    </linearGradient>
  </defs>

  <!-- Dark Premium Square with soft rounded corners -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" stroke="#27272A" stroke-width="8" />

  <!-- Abstract Barber Pole / Razor / Scissors Styling -->
  <g transform="translate(136, 110)">
    <!-- Barber Pole Stripes/Background Glow -->
    <path d="M120 20 L120 272" stroke="url(#goldGrad)" stroke-width="12" stroke-linecap="round" opacity="0.15" />
    
    <!-- Stylized Razor Blade / Scissors Emblem -->
    <path d="M60 160 C60 110, 100 70, 120 70 C140 70, 180 110, 180 160 C180 210, 140 250, 120 250 C100 250, 60 210, 60 160 Z" 
          fill="none" stroke="url(#goldGrad)" stroke-width="16" stroke-linecap="round" />
          
    <circle cx="120" cy="160" r="28" fill="url(#goldGrad)" />
    
    <!-- Outer Decorative Ring -->
    <circle cx="120" cy="160" r="110" fill="none" stroke="url(#silverGrad)" stroke-width="6" stroke-dasharray="16, 12" opacity="0.6" />
    
    <!-- Elegant 'BF' Monogram in Display Serif/Sans -->
    <text x="120" y="176" 
          font-family="'Inter', 'Space Grotesk', system-ui, sans-serif" 
          font-size="64" 
          font-weight="900" 
          fill="#0E0E11" 
          text-anchor="middle"
          letter-spacing="-2">BF</text>
  </g>
  
  <!-- Subtle brand text at the bottom -->
  <text x="256" y="440" 
        font-family="'Space Grotesk', 'Inter', system-ui, sans-serif" 
        font-size="28" 
        font-weight="700" 
        fill="url(#goldGrad)" 
        text-anchor="middle" 
        letter-spacing="4">BARBERSFLOW</text>
</svg>
